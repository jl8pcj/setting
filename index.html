<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Piezo Setting</title>
<style>
body{font-family:sans-serif;background:#111;color:#fff}
.slider{width:300px}
.box{margin:15px;padding:10px;border:1px solid #555}
</style>
</head>

<body>

<h2>RP2040 Piezo 調整</h2>

<button onclick="connect()">接続</button>

<div id="ui"></div>

<script>

let port;
let writer;
let reader;

let settings={
  threshold:[20000,20000,20000,20000],
  gain:[1,1,1,1]
};

async function connect(){

  port=await navigator.serial.requestPort();
  await port.open({baudRate:115200});

  writer=port.writable.getWriter();
  reader=port.readable.getReader();

  await send("GET\n");
  readLoop();
}

async function send(msg){
  await writer.write(new TextEncoder().encode(msg));
}

async function readLoop(){
  while(true){
    const {value}=await reader.read();
    if(!value) continue;

    let txt=new TextDecoder().decode(value).trim();

    try{
      let data=JSON.parse(txt);
      settings=data;
      buildUI();
    }catch{}
  }
}

function buildUI(){

  let html="";

  for(let i=0;i<4;i++){

    html+=`
    <div class="box">
    Piezo ${i}

    <br>Threshold
    <input class="slider" type="range"
      min="1000" max="60000"
      value="${settings.threshold[i]}"
      oninput="chgT(${i},this.value)">
    <span id="t${i}">${settings.threshold[i]}</span>

    <br>Gain
    <input class="slider" type="range"
      min="0.5" max="3" step="0.1"
      value="${settings.gain[i]}"
      oninput="chgG(${i},this.value)">
    <span id="g${i}">${settings.gain[i]}</span>
    </div>
    `;
  }

  document.getElementById("ui").innerHTML=html;
}

function chgT(i,v){
  settings.threshold[i]=Number(v);
  document.getElementById("t"+i).textContent=v;
  save();
}

function chgG(i,v){
  settings.gain[i]=Number(v);
  document.getElementById("g"+i).textContent=v;
  save();
}

async function save(){
  await send("SET"+JSON.stringify(settings)+"\n");
}

</script>
</body>
</html>
