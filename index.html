<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<title>RP2040 Piezo Controller</title>

<style>
body{
  background:#0b0b0b;
  color:#fff;
  font-family:sans-serif;
  padding:20px;
}

h2{margin-bottom:10px;}

#status{
  font-size:18px;
  margin-bottom:15px;
}

.dot{
  width:14px;
  height:14px;
  border-radius:50%;
  display:inline-block;
  margin-right:8px;
}

.red{background:#ff4040;}
.yellow{background:#ffd000;}
.green{background:#00ff88;}

button{
  font-size:16px;
  padding:10px 16px;
  margin-right:10px;
  cursor:pointer;
}

.card{
  border:1px solid #333;
  padding:18px;
  margin:14px 0;
  background:#151515;
}

.meterWrap{
  position:relative;
  width:100%;
  height:34px;
  background:#222;
  border-radius:6px;
  overflow:hidden;
}

.meterBar{
  position:absolute;
  height:100%;
  width:0%;
  background:linear-gradient(90deg,#00ff88,#ffee00,#ff4040);
}

.peakBar{
  position:absolute;
  top:0;
  width:4px;
  height:100%;
  background:#ffffff;
}

.slider{
  width:100%;
}

label{
  font-size:14px;
}
</style>

</head>

<body>

<h2>RP2040 ピエゾ設定UI</h2>

<div id="status">
  <span id="led" class="dot red"></span>
  <span id="statText">DISCONNECTED</span>
</div>

<button onclick="connect()">接続</button> <button onclick="save()">SAVE</button>

<div id="channels"></div>

<script>

let port,reader,writer;
let lastReceive=0;

const names=["D","F","J","K"];
let peaks=[0,0,0,0];

function setStatus(text,color){
  statText.textContent=text;
  led.className="dot "+color;
}

/* ================= CONNECT ================= */

async function connect(){

  try{
    setStatus("CONNECTING","yellow");

    port = await navigator.serial.requestPort();
    await port.open({baudRate:115200});

    writer = port.writable.getWriter();
    reader = port.readable.getReader();

    createUI();

    setStatus("CONNECTED","green");

    startRead();

    send({cmd:"get_settings"});

  }catch(e){
    console.error(e);
    setStatus("FAILED","red");
  }
}

      <br><br>
