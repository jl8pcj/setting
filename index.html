<script>

let port;
let writer;
let reader;

const statusText = document.getElementById("status");
const threshold = document.getElementById("threshold");
const thresholdValue = document.getElementById("thresholdValue");

// ----------------
// スライダー操作
// ----------------
threshold.oninput = () => {
    thresholdValue.textContent = threshold.value;
    sendLive();
};

// ----------------
// USB接続
// ----------------
async function connect() {

    port = await navigator.serial.requestPort();
    await port.open({ baudRate:115200 });

    writer = port.writable.getWriter();
    reader = port.readable.getReader();

    statusText.textContent = "接続OK";

    readLoop();

    // ★ 接続通知
    await writer.write(
        new TextEncoder().encode("HELLO\n")
    );
}

// ----------------
// RP2040受信
// ----------------
async function readLoop() {

    const decoder = new TextDecoder();

    while (true) {

        const { value, done } = await reader.read();
        if (done) break;

        const text = decoder.decode(value).trim();

        console.log("RP2040:", text);

        if (text.startsWith("SETTINGS ")) {

            const data =
                JSON.parse(text.substring(9));

            // スライダー同期
            threshold.value = data.threshold;
            thresholdValue.textContent = data.threshold;

            statusText.textContent = "設定同期OK";
        }

        if (text === "SAVED") {
            statusText.textContent = "✅ 保存完了";
        }
    }
}

// ----------------
// リアルタイム送信
// ----------------
async function sendLive() {

    if (!writer) return;

    const obj = {
        threshold: Number(threshold.value)
    };

    const txt = "SET " + JSON.stringify(obj) + "\n";

    await writer.write(
        new TextEncoder().encode(txt)
    );
}

// ----------------
// SAVE
// ----------------
async function save() {

    statusText.textContent = "保存中...";

    await writer.write(
        new TextEncoder().encode("SAVE\n")
    );
}

</script>
