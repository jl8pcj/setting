<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>RP2040 Setting</title>

<style>
body{
  background:#111;
  color:#fff;
  font-family:sans-serif;
  padding:20px;
}

#status{
  font-size:18px;
  margin-bottom:15px;
}

.dot{
  display:inline-block;
  width:12px;
  height:12px;
  border-radius:50%;
  margin-right:8px;
}

.red{background:#f33;}
.yellow{background:#ff0;}
.green{background:#3f3;}

.card{
  border:1px solid #444;
  padding:10px;
  margin:10px 0;
}

meter{
  width:100%;
  height:20px;
}
</style>
</head>

<body>

<h2>RP2040 Controller</h2>

<div id="status">
  <span class="dot red" id="led"></span>
  <span id="statText">DISCONNECTED</span>
</div>

<button onclick="connect()">接続</button>
<button onclick="save()">SAVE</button>

<div id="channels"></div>

<script>
let port,reader,writer;
let lastReceive=0;

const names=["D","F","J","K"];
let peaks=[0,0,0,0];

function setStatus(text,color){
  document.getElementById("statText").textContent=text;
  document.getElementById("led").className="dot "+color;
}

async function connect(){

  setStatus("CONNECTING...","yellow");

  port=await navigator.serial.requestPort();
  await port.open({baudRate:115200});

  writer=port.writable.getWriter();
  reader=port.readable.getReader();

  setStatus("CONNECTED","green");

  createUI();
  startRead();
}

function createUI(){

  const root=document.getElementById("channels");
  root.innerHTML="";

  for(let i=0;i<4;i++){

    const div=document.createElement("div");
    div.className="card";

    div.innerHTML=`
      <h3>${names[i]}</h3>

      gain
      <input type="range" min="0.5" max="5" step="0.1"
        oninput="sendParam(${i},this.value,'gain')">

      threshold
      <input type="range" min="1000" max="40000" step="500"
        oninput="sendParam(${i},this.value,'threshold')">

      <meter id="m${i}" min="0" max="65535"></meter>
      PEAK:<span id="p${i}">0</span>
    `;

    root.appendChild(div);
  }
}

async function sendParam(ch,val,type){
  writer.write(new TextEncoder().encode(
    JSON.stringify({
      cmd:"set",
      ch:ch,
      type:type,
      value:parseFloat(val)
    })+"\n"
  ));
}

async function save(){
  writer.write(new TextEncoder().encode(
    JSON.stringify({cmd:"save"})+"\n"
  ));
}

async function startRead(){

  const decoder=new TextDecoder();

  while(true){

    const {value,done}=await reader.read();
    if(done){
      setStatus("DISCONNECTED","red");
      break;
    }

    lastReceive=Date.now();
    setStatus("RECEIVING DATA","green");

    const text=decoder.decode(value);
    const lines=text.split("\n");

    for(const line of lines){

      if(!line.startsWith("{")) continue;

      try{
        const data=JSON.parse(line);

        if(data.type==="adc"){

          const ch=data.ch;
          const val=data.value;

          document.getElementById("m"+ch).value=val;

          if(val>peaks[ch]){
            peaks[ch]=val;
            document.getElementById("p"+ch).textContent=val;
          }
        }

      }catch(e){}
    }
  }
}

/* 通信停止監視 */
setInterval(()=>{
  if(Date.now()-lastReceive>1500){
    setStatus("NO DATA","red");
  }
},500);

</script>

</body>
</html>
